<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raknow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --muted: #888580;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header with fade-to-bg at bottom */
    .header-wrap {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin-bottom: 0;
      animation: fadeIn 0.5s ease both;
    }

    .header-wrap img {
      width: 100%;
      display: block;
    }

    .header-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, #0a0a0a);
      pointer-events: none;
    }

    /* Logo centered below header */
    .logo-wrap {
      margin-top: -28px;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      display: block;
    }

    h1 {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-top: 14px;
      margin-bottom: 4px;
      text-align: center;
      animation: fadeUp 0.4s 0.15s ease both;
    }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 32px;
      text-align: center;
      animation: fadeUp 0.4s 0.2s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }

    .link:hover {
      background: var(--surface2);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .link:hover .arrow { transform: translate(2px, -2px); opacity: 1; }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 16px; height: 16px; }
    .link-text { flex: 1; }

    .link-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      line-height: 1;
      margin-bottom: 3px;
    }

    .link-name { font-size: 15px; font-weight: 400; color: var(--text); }

    .arrow {
      color: var(--muted);
      opacity: 0.4;
      transition: transform 0.18s, opacity 0.18s;
      font-size: 14px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.3;
      letter-spacing: 0.04em;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .links .link:nth-child(1) { animation: fadeUp 0.35s 0.25s ease both; }
    .links .link:nth-child(2) { animation: fadeUp 0.35s 0.3s ease both; }
    .links .link:nth-child(3) { animation: fadeUp 0.35s 0.35s ease both; }
    .links .link:nth-child(4) { animation: fadeUp 0.35s 0.4s ease both; }
    .links .link:nth-child(5) { animation: fadeUp 0.35s 0.45s ease both; }
    .links .link:nth-child(6) { animation: fadeUp 0.35s 0.5s ease both; }
    .links .link:nth-child(7) { animation: fadeUp 0.35s 0.55s ease both; }
  </style>
</head>
